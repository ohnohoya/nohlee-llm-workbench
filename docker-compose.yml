services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openai-lab-api
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output

  ui:
    image: node:20-alpine
    container_name: openai-lab-ui
    working_dir: /app/results_ui
    depends_on:
      - api
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
